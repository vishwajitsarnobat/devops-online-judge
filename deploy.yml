---
- name: Deploy online-judge locally
  hosts: local
  become: true
  vars:
    app_dir: /home/vishwajit/online-judge
    deploy_user: vishwajit
    repo_url: https://github.com/vishwajitsarnobat/devops-online-judge.git
    repo_branch: main

  tasks:
    - name: Ensure base packages are present
      dnf:
        name:
          - git
          - podman
          - podman-docker
          - podman-compose
          - python3
        state: present

    - name: Ensure Podman socket is enabled for deploy user
      become: true
      become_user: "{{ deploy_user }}"
      systemd:
        name: podman.socket
        scope: user
        enabled: true
        state: started

    - name: Ensure Docker socket symlink exists
      file:
        src: "/run/user/{{ deploy_user_uid }}/podman/podman.sock"
        dest: /var/run/docker.sock
        state: link
        force: true
      vars:
        deploy_user_uid: "{{ ansible_facts['user_uid'] | default(1000) }}"

    - name: Pull latest code from GitHub
      become: true
      become_user: "{{ deploy_user }}"
      git:
        repo: "{{ repo_url }}"
        dest: "{{ app_dir }}"
        version: "{{ repo_branch }}"
        force: true

    - name: Inject environment variables
      copy:
        src: ./.env
        dest: "{{ app_dir }}/.env"
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: '0600'

    - name: Pull runtime images
      become: true
      become_user: "{{ deploy_user }}"
      command: "podman pull docker.io/library/{{ item }}"
      loop:
        - python:3.10-slim
        - gcc:latest
      changed_when: true

    - name: Stop existing containers
      become: true
      become_user: "{{ deploy_user }}"
      shell: |
        cd "{{ app_dir }}"
        podman-compose down || true
      args:
        executable: /bin/bash
      ignore_errors: true

    - name: Start application with Podman Compose
      become: true
      become_user: "{{ deploy_user }}"
      shell: |
        set -e
        cd "{{ app_dir }}"
        podman-compose up --build -d
      args:
        executable: /bin/bash
