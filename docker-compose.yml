services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: online-judge-backend
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:3000}
    container_name: online-judge-frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"
    restart: unless-stopped
