# docker-compose.prod.yml
# Production compose file — pulls pre-built images from Docker Hub.
# Used by Ansible on the EC2 instance. No source code needed on the server.
#
# Required env vars (set in .env or by the shell):
#   DOCKER_USER  — Docker Hub username (e.g. vishwajitsarnobat)
#   IMAGE_TAG    — Image tag to deploy (default: latest)

services:
  backend:
    image: ${DOCKER_USER:-vishwajitsarnobat}/online-judge-backend:${IMAGE_TAG:-latest}
    container_name: online-judge-backend
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    image: ${DOCKER_USER:-vishwajitsarnobat}/online-judge-frontend:${IMAGE_TAG:-latest}
    container_name: online-judge-frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"
    restart: unless-stopped
